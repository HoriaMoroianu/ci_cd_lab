apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: go-simple-webserver
  labels:
    app: go-simple-webserver
spec:
  replicas: 10
  strategy:
    canary:
      steps:
        - setWeight: 50
        - pause: { duration: 60s }
        - setWeight: 100
  selector:
    matchLabels:
      app: go-simple-webserver
  template:
    metadata:
      labels:
        app: go-simple-webserver
    spec:
      containers:
        - name: webserver
          image: ghcr.io/horiamoroianu/go-simple-webserver@sha256:b8074373075829523a83e3c8c9186d07dfd00a72e16d80d26fedc29e11241002
          ports:
            - containerPort: 8080
          imagePullPolicy: Always
